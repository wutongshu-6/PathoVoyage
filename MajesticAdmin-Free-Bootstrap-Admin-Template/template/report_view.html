<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>诊断报告 - 影航多尺度动态探索型AI与可解释诊断平台</title>
  <link rel="stylesheet" href="vendors/mdi/css/materialdesignicons.min.css">
  <link rel="stylesheet" href="vendors/base/vendor.bundle.base.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pv-theme-glass.css" />
  <link rel="shortcut icon" href="images/favicon.png" />
</head>
<body class="pv-report-view-page">
  <script>
  (function(){var k='pv_sidebar_icon_only';try{if(localStorage.getItem(k)==='1'){document.body.classList.add('sidebar-icon-only');return;}}catch(e){}var m=document.cookie.match(new RegExp('(?:^|; )'+k+'=([^;]*)'));if(m&&decodeURIComponent(m[1])==='1')document.body.classList.add('sidebar-icon-only');})();
  </script>
  <div class="container-scroller">
    <div class="container-fluid page-body-wrapper pv-report-body-wrapper">
      <div class="main-panel">
        <div class="content-wrapper">
          <div class="pv-report-layout">
            <div class="pv-report-main">
              <div class="pv-report-shell">
                <div class="d-flex flex-wrap justify-content-between align-items-start align-items-md-center gap-3 pv-report-toolbar">
                  <div class="pr-1 flex-grow-1 pv-report-toolbar-text">
                    <h2 class="d-flex align-items-center gap-2 flex-wrap mb-1"><i class="mdi mdi-file-document-outline text-primary"></i> 诊断报告</h2>
                    <p class="text-muted small mb-0" id="pv_report_subtitle">预览当前病例的诊断报告 PDF。</p>
                  </div>
                  <div class="d-flex flex-wrap gap-2 flex-shrink-0 align-items-center">
                    <a id="pv_report_download_btn" href="assets/docs/diagnostic_report.pdf" download="诊断报告.pdf" class="btn btn-primary btn-sm">下载报告</a>
                    <a id="pv_report_back_btn" href="analysis.html" class="btn btn-outline-secondary btn-sm">返回智能分析</a>
                  </div>
                </div>

                <div class="card pv-report-view-card border-0">
                  <div class="card-body p-0">
                    <div class="pv-report-pdf-frame-wrap">
                      <iframe id="pv_report_pdf_frame" class="w-100 d-block" title="诊断报告 PDF"></iframe>
                    </div>
                  </div>
                </div>
              </div>
              <p class="text-muted small mt-3 mb-0 pv-report-footnote">若浏览器无法内嵌显示 PDF，请直接点击「下载报告」或侧栏「新标签页打开」。</p>
            </div>

            <aside class="pv-report-rail" aria-label="报告侧栏">
              <div class="pv-report-rail-brand">
                <span class="pv-report-rail-logo">影航</span>
                <span class="pv-report-rail-tag">PathoVoyage</span>
              </div>
              <div class="pv-report-rail-card">
                <p class="pv-report-rail-label mb-1">当前病例</p>
                <p class="pv-report-rail-case" id="pv_report_rail_case">—</p>
                <p class="pv-report-rail-meta small text-muted mb-0">标准化病理诊断报告 · PDF</p>
              </div>
              <div class="pv-report-rail-tips">
                <p class="pv-report-rail-tips-title"><i class="mdi mdi-lightbulb-outline text-primary"></i> 阅读提示</p>
                <ul class="pv-report-rail-tips-list">
                  <li>使用浏览器内置工具缩放、搜索、翻页。</li>
                  <li>打印请使用 PDF 查看器内「打印」。</li>
                  <li>内嵌异常时，可下载或新标签打开。</li>
                </ul>
              </div>
              <a id="pv_report_open_tab" class="pv-report-rail-link" href="assets/docs/diagnostic_report.pdf" target="_blank" rel="noopener noreferrer">
                <i class="mdi mdi-open-in-new"></i> 新标签页打开 PDF
              </a>
              <div class="pv-report-rail-deco" aria-hidden="true"></div>
            </aside>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="vendors/base/vendor.bundle.base.js"></script>
  <script src="js/sidebar-state-boot.js"></script>
  <script src="js/off-canvas.js"></script>
  <script src="js/hoverable-collapse.js"></script>
  <script src="js/template.js"></script>
  <script>
    (function () {
      var PDF_SRC = 'assets/docs/diagnostic_report.pdf';
      var params = new URLSearchParams(window.location.search);
      var caseId = params.get('case_id') || 'npc';
      var back = document.getElementById('pv_report_back_btn');
      if (back) {
        back.href = 'analysis.html?case_id=' + encodeURIComponent(caseId);
      }
      var sub = document.getElementById('pv_report_subtitle');
      if (sub) {
        sub.textContent = '病例编号：' + caseId + ' · 以下为 PDF 预览。';
      }
      var railCase = document.getElementById('pv_report_rail_case');
      if (railCase) {
        railCase.textContent = caseId;
      }
      var openTab = document.getElementById('pv_report_open_tab');
      if (openTab) {
        openTab.href = PDF_SRC;
      }
      var frame = document.getElementById('pv_report_pdf_frame');
      if (frame) {
        frame.src = PDF_SRC + '#view=FitH';
      }
    })();
  </script>
</body>
</html>
