<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>登录 - 影航多尺度动态探索型AI与可解释诊断平台</title>
  <link rel="stylesheet" href="vendors/mdi/css/materialdesignicons.min.css">
  <link rel="stylesheet" href="vendors/base/vendor.bundle.base.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="shortcut icon" href="images/favicon.png" />
</head>
<body>
  <div class="container-scroller">
    <div class="container-fluid page-body-wrapper full-page-wrapper">
      <div class="content-wrapper d-flex align-items-center auth px-0">
        <div class="row w-100 mx-0">
          <div class="col-lg-4 mx-auto">
            <div class="auth-form-light text-left py-5 px-4 px-sm-5">
              <div class="brand-logo">
                <img src="images/影航AI病理智能体logo设计.png" alt="影航" style="width: auto; height: auto; max-height: 48px; object-fit: contain;">
              </div>
              <h4 class="mt-3">欢迎使用 影航</h4>
              <h6 class="font-weight-light">病理全切片 AI 辅助诊断平台 · 请登录后继续</h6>
              <form class="pt-3" id="pv_login_form" action="index.html" method="get">
                <div class="form-group">
                  <label class="small text-muted mb-1">登录方式</label>
                  <select class="form-control form-control-lg" id="pv_login_method" name="login_method">
                    <option value="email" selected>使用邮箱登录</option>
                    <option value="phone">使用手机号登录</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="small text-muted mb-1" id="pv_login_id_label" for="pv_login_id">邮箱</label>
                  <input type="text" class="form-control form-control-lg" id="pv_login_id" name="login_id" autocomplete="username" value="" placeholder="************">
                </div>
                <div class="form-group">
                  <label class="small text-muted mb-1" for="pv_login_password">密码</label>
                  <input type="password" class="form-control form-control-lg" id="pv_login_password" name="password" autocomplete="current-password" value="" placeholder="********">
                </div>
                <div class="mt-3">
                  <button type="submit" class="btn btn-block btn-primary btn-lg font-weight-medium auth-form-btn">登录</button>
                </div>
                <div class="my-2 d-flex justify-content-between align-items-center">
                  <div class="form-check">
                    <label class="form-check-label text-muted">
                      <input type="checkbox" class="form-check-input" checked>
                      记住本次登录（演示）
                    </label>
                  </div>
                  <a href="#" class="auth-link text-black" onclick="return false;" title="演示环境暂未开通">忘记密码？</a>
                </div>
                <p class="text-muted small mb-0">演示说明：账号与密码可为空，点击「登录」即可进入平台（无真实鉴权）。</p>
              </form>
              <div class="text-center border-top pt-3 mt-4">
                <p class="text-muted small mb-0"><span class="font-weight-medium text-primary">影航</span><span class="d-none d-sm-inline"> · </span><span class="d-block d-sm-inline mt-1 mt-sm-0">多尺度动态探索型AI与可解释诊断平台</span></p>
                <p class="text-muted small mb-0 mt-2">数字病理 · AI辅助诊断</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="vendors/base/vendor.bundle.base.js"></script>
  <script src="js/off-canvas.js"></script>
  <script src="js/hoverable-collapse.js"></script>
  <script src="js/template.js"></script>
  <script>
    (function () {
      var method = document.getElementById('pv_login_method');
      var label = document.getElementById('pv_login_id_label');
      var input = document.getElementById('pv_login_id');
      var form = document.getElementById('pv_login_form');

      function syncMethod() {
        if (method.value === 'phone') {
          label.textContent = '手机号';
          input.placeholder = '***********';
          input.type = 'tel';
          input.value = '';
        } else {
          label.textContent = '邮箱';
          input.placeholder = '************';
          input.type = 'email';
          input.value = '';
        }
      }
      method.addEventListener('change', syncMethod);
      syncMethod();

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        window.location.href = 'index.html';
      });
    })();
  </script>
</body>
</html>
