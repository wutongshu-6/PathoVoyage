  <script>
    (function () {
      var bar = document.getElementById("upload_progress_bar");
      var btn = document.getElementById("upload_submit_btn");
      var input = document.getElementById("slice_file_input");
      var animTimer = null;
      var statusText = document.getElementById("upload_status_text");
      var actions = document.getElementById("upload_actions");
      var uploadAgainBtn = document.getElementById("upload_again_btn");
      function setProgress(pct) {
        pct = Math.max(0, Math.min(100, pct));
        bar.style.width = pct + "%";
        bar.setAttribute("aria-valuenow", String(pct));
        bar.textContent = Math.round(pct) + "%";
      }
      function stopBarAnimation() {
        bar.classList.remove("progress-bar-animated");
      }
      function startBarAnimation() {
        bar.classList.add("progress-bar-animated");
      }
      function runUploadProgress() {
        if (animTimer) { cancelAnimationFrame(animTimer); animTimer = null; }
        actions.style.display = "none";
        statusText.textContent = "上传中...";
        startBarAnimation();
        var start = performance.now();
        var duration = 2600;
        function frame(now) {
          var t = (now - start) / duration;
          if (t >= 1) {
            setProgress(100);
            animTimer = null;
            stopBarAnimation();
            statusText.textContent = "上传完成";
            actions.style.display = "block";
            return;
          }
          setProgress(t * 100);
          animTimer = requestAnimationFrame(frame);
        }
        animTimer = requestAnimationFrame(frame);
      }
      btn.addEventListener("click", function () {
        if (!input.files || !input.files.length) {
          alert("请先选择要上传的切片文件。");
          return;
        }
        setProgress(0);
        runUploadProgress();
      });
      uploadAgainBtn.addEventListener("click", function () {
        input.value = "";
        setProgress(0);
        statusText.textContent = "等待上传";
        actions.style.display = "none";
        startBarAnimation();
      });
    })();
  </script>
