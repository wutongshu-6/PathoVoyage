<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>诊断报告 - 影航多尺度动态探索型AI与可解释诊断平台</title>
  <link rel="stylesheet" href="vendors/mdi/css/materialdesignicons.min.css">
  <link rel="stylesheet" href="vendors/base/vendor.bundle.base.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="shortcut icon" href="images/favicon.png" />
  <style>
    /* 专注阅读：无全局顶栏/侧栏，主区域全宽 */
    .pv-report-view-page .page-body-wrapper.pv-report-body-wrapper {
      padding-top: 0 !important;
      min-height: 100vh;
    }
    .pv-report-view-page .main-panel {
      width: 100% !important;
      min-height: 100vh;
    }
    /* 报告页：主内容区水平居中（与常见 PDF 版心宽度协调） */
    .pv-report-view-page .content-wrapper {
      padding: 0.45rem 0.35rem 0.2rem 0.35rem !important;
      max-width: min(1120px, 100%);
      width: 100%;
      margin-left: auto !important;
      margin-right: auto !important;
      background: #fff !important;
    }
    @media (min-width: 1200px) {
      .pv-report-view-page .content-wrapper {
        padding-left: 0.5rem !important;
        padding-right: 0.5rem !important;
      }
    }
    .pv-report-view-page .pv-report-toolbar {
      padding-top: 0.35rem;
    }
    .pv-report-view-page .pv-report-toolbar h2 {
      font-size: 1.35rem;
      margin-bottom: 0.15rem;
    }
    .pv-report-view-card {
      border-left: 4px solid #165DFF;
      box-shadow: 0 4px 24px rgba(15, 23, 42, 0.06);
      margin-bottom: 0 !important;
      margin-left: auto;
      margin-right: auto;
      max-width: 100%;
    }
    #pv_report_pdf_frame {
      display: block;
      width: 100%;
      border: 0;
      background: #e8edf3;
      /* 无顶栏/侧栏后，主要为工具条 + 底部提示预留高度 */
      height: calc(100vh - 118px);
      min-height: 620px;
    }
    @media (max-width: 991px) {
      #pv_report_pdf_frame {
        height: calc(100vh - 140px);
        min-height: 480px;
      }
    }
  </style>
</head>
<body class="pv-report-view-page">
  <div class="container-scroller">
    <div class="container-fluid page-body-wrapper pv-report-body-wrapper">
      <div class="main-panel">
        <div class="content-wrapper">
          <div class="d-flex flex-wrap justify-content-between align-items-start align-items-md-center gap-2 mb-2 pv-report-toolbar">
            <div class="pr-2">
              <h2 class="d-flex align-items-center gap-2 flex-wrap"><i class="mdi mdi-file-document-outline text-primary"></i> 诊断报告</h2>
              <p class="text-muted small mb-0" id="pv_report_subtitle">预览当前病例的诊断报告 PDF。</p>
            </div>
            <div class="d-flex flex-wrap gap-2 flex-shrink-0">
              <a id="pv_report_download_btn" href="assets/docs/diagnostic_report.pdf" download="诊断报告.pdf" class="btn btn-primary btn-sm">下载报告</a>
              <a id="pv_report_back_btn" href="analysis.html" class="btn btn-outline-secondary btn-sm">返回智能分析</a>
            </div>
          </div>

          <div class="card pv-report-view-card">
            <div class="card-body p-0">
              <iframe id="pv_report_pdf_frame" class="w-100 d-block" title="诊断报告 PDF"></iframe>
            </div>
          </div>
          <p class="text-muted small mt-2 mb-0 text-center">若浏览器无法内嵌显示 PDF，请直接点击「下载报告」。</p>
        </div>
      </div>
    </div>
  </div>
  <script src="vendors/base/vendor.bundle.base.js"></script>
  <script src="js/off-canvas.js"></script>
  <script src="js/hoverable-collapse.js"></script>
  <script src="js/template.js"></script>
  <script>
    (function () {
      var PDF_SRC = 'assets/docs/diagnostic_report.pdf';
      var params = new URLSearchParams(window.location.search);
      var caseId = params.get('case_id') || 'npc';
      var back = document.getElementById('pv_report_back_btn');
      if (back) {
        back.href = 'analysis.html?case_id=' + encodeURIComponent(caseId);
      }
      var sub = document.getElementById('pv_report_subtitle');
      if (sub) {
        sub.textContent = '病例编号：' + caseId + ' · 以下为 PDF 预览。';
      }
      var frame = document.getElementById('pv_report_pdf_frame');
      if (frame) {
        frame.src = PDF_SRC + '#view=FitH';
      }
    })();
  </script>
</body>
</html>
